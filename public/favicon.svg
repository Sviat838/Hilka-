<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hilka — a branching thought tree">
  <!-- Forest-green tile, matching the app's paper-theme accent (#3a5a40) -->
  <rect width="100" height="100" rx="24" fill="#3a5a40"/>
  <!-- Branching decision tree: one root above, two children below.
       Mirrors the in-app Tree-view glyph. Cream on green. -->
  <g stroke="#fbf8f2" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M50 28 L28 71"/>
    <path d="M50 28 L72 71"/>
  </g>
  <g fill="#fbf8f2">
    <circle cx="50" cy="28" r="11"/>
    <circle cx="28" cy="71" r="10"/>
    <circle cx="72" cy="71" r="10"/>
  </g>
</svg>
